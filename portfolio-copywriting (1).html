<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Aaron</title>
<link rel="icon" type="image/x-icon" href="paper.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Montserrat:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Raleway:wght@400;600;700;800&family=Oswald:wght@400;600;700&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #006CE0;
    --blue-dim: rgba(0, 212, 255, 0.12);
    --blue-glow: #006CE0;
    --blue-glow-strong: rgba(0, 212, 255, 0.6);
    --bg: #282828;
    --bg2: #030304;
    --card: #13131C;
    --card-border: rgba(14, 165, 233, 0.12);
    --gray: #8892A4;
    --gray-light: #C4CDD8;
    --white: #F0F4FA;
    --font-display:'Raleway ';
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ─── AMBIENT GLOW BG ─── */
  .ambient {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .ambient-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation: drift1 18s ease-in-out infinite alternate;
  }
  .ambient-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,212,255,0.05) 0%, transparent 70%);
    bottom: 10%; right: -100px;
    animation: drift2 22s ease-in-out infinite alternate;
  }
  @keyframes drift1 { 0%{transform:translate(0,0)} 100%{transform:translate(60px,40px)} }
  @keyframes drift2 { 0%{transform:translate(0,0)} 100%{transform:translate(-40px,-60px)} }

  /* ─── LAYOUT ─── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 24px;
    position: relative;
  }

  .hero-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp 0.9s ease both;
  }

  /* ─── AVATAR ─── */
  .avatar-wrap {
    position: relative;
    display: inline-flex;
  }
  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #0d1117);
    border: 2px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--blue);
    letter-spacing: -1px;
    box-shadow: 0 0 40px var(--blue-glow), inset 0 0 20px rgba(14,165,233,0.05);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .avatar-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(14,165,233,0.25);
    animation: spin-slow 12s linear infinite;
  }
  .avatar-ring::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--blue);
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  /* ─── NAME ─── */
  .hero-name { /* pour le aaron */
    font-family: 'Lora';
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--white);
  }
  .hero-name span { /* pour le copywriting */
    color: var(--blue);
    position: relative;
    font-family: 'Playfair Display';
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue-dim);
    border: 1px solid var(--card-border);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
  }
  .hero-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--blue);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blue), transparent);
    margin: 8px auto;
  }

  /* ─── SCROLL INDICATOR ─── */
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--gray);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: fadeUp 1.4s 0.6s ease both;
  }
  .scroll-arrow {
    width: 24px; height: 36px;
    border: 1px solid rgba(14,165,233,0.3);
    border-radius: 12px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 6px;
  }
  .scroll-dot {
    width: 4px; height: 4px;
    background: var(--blue);
    border-radius: 50%;
    animation: scroll-down 2s ease infinite;
  }
  @keyframes scroll-down {
    0% { transform: translateY(0); opacity: 1; }
    80% { transform: translateY(14px); opacity: 0; }
    100% { transform: translateY(0); opacity: 0; }
  }

  /* ─── SECTION INTRO ─── */
  .section-intro {
    padding: 60px 0 20px;
    text-align: center;
  }
  .section-intro h2 {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .section-intro h2 em {
    font-style: normal;
    color: var(--blue);
  }
  .section-intro p {
    color: var(--gray);
    font-size: 1rem;
    margin-top: 10px;
    font-weight: 300;
  }

  /* ─── GRID ─── */
  .cards-section {
    padding: 40px 0 100px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 36px 28px;
    cursor: pointer;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease, border-color 0.3s ease;
    box-shadow: 0 0 0 rgba(14,165,233,0);
    animation: fadeUp 0.7s ease both;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.19s; }
  .card:nth-child(4) { animation-delay: 0.26s; }
  .card:nth-child(5) { animation-delay: 0.33s; }
  .card:nth-child(6) { animation-delay: 0.40s; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,0.08) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: rgba(14,165,233,0.4);
    box-shadow: 0 0 40px rgba(0,212,255,0.2), 0 20px 40px rgba(0,0,0,0.4);
  }
  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2.2rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(14,165,233,0.4));
  }

  .card-label {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  .card-count {
    font-size: 0.78rem;
    color: var(--blue);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--blue-dim);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 100px;
    margin-top: 8px;
  }

  .card-arrow {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 28px; height: 28px;
    border: 1px solid rgba(14,165,233,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue);
    font-size: 0.75rem;
    transition: all 0.3s ease;
  }
  .card:hover .card-arrow {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 0 12px var(--blue-glow);
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 10, 0.85);
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: #13131C;
    border: 1px solid rgba(14,165,233,0.2);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 540px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 0 80px rgba(0,212,255,0.15), 0 40px 80px rgba(0,0,0,0.6);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .modal-overlay.active .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .modal-title-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-icon { font-size: 1.6rem; }
  .modal-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--white);
  }
  .modal-close {
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    background: none;
    color: var(--gray);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .modal-close:hover {
    border-color: rgba(14,165,233,0.4);
    color: var(--blue);
    background: var(--blue-dim);
  }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .project-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    transition: all 0.2s ease;
  }
  .project-item:hover {
    background: var(--blue-dim);
    border-color: rgba(14,165,233,0.2);
  }
  .project-name {
    font-size: 0.95rem;
    font-weight: 400;
    color: var(--gray-light);
    flex: 1;
    line-height: 1.3;
  }

  .btn-voir {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue-dim);
    border: 1px solid rgba(14,165,233,0.3);
    color: var(--blue);
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.2s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-voir:hover {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    box-shadow: 0 0 20px var(--blue-glow);
  }
  .btn-voir svg {
    width: 10px; height: 10px;
  }

  .modal-empty {
    text-align: center;
    color: var(--gray);
    font-size: 0.9rem;
    padding: 20px 0;
  }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid rgba(255,255,255,0.04);
    padding: 32px 24px;
    text-align: center;
    color: var(--gray);
    font-size: 0.8rem;
    position: relative;
    z-index: 1;
  }
  footer span { color: var(--blue); }

  /* ─── ANIM ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── SCROLLBAR ─── */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.3); border-radius: 2px; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .modal { padding: 28px 20px; }
    .project-item { flex-direction: column; align-items: flex-start; }
    .btn-voir { width: 100%; justify-content: center; }
    .hero-name { letter-spacing: -1.5px; }
  }
</style>
</head>

    <span class="card-icon">${cat.icon}</span>
    <div class="card-label">${cat.label}</div>
    <div class="card-count">${cat.projects.length} projet${cat.projects.length > 1 ? 's' : ''}</div>
    <div class="card-arrow">→</div>
  `;
  card.addEventListener("click", () => openModal(cat));
  grid.appendChild(card);
});

// ─── MODAL ───
const overlay = document.getElementById("modalOverlay");
const modalTitle = document.getElementById("modalTitle");
const modalIcon = document.getElementById("modalIcon");
const projectList = document.getElementById("projectList");

function openModal(cat) {
  modalIcon.textContent = cat.icon;
  modalTitle.textContent = cat.label;
  projectList.innerHTML = "";

  if (cat.projects.length === 0) {
    projectList.innerHTML = `<p class="modal-empty">Aucun projet disponible pour l'instant.</p>`;
  } else {
    cat.projects.forEach((p) => {
      const item = document.createElement("div");
      item.className = "project-item";
      item.innerHTML = `
        <span class="project-name">${p.name}</span>
        <a class="btn-voir" href="${p.url}" target="_blank" rel="noopener">
          Voir
          <svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
      `;
      projectList.appendChild(item);
    });
  }
  overlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === overlay) closeModalDirect();
}
function closeModalDirect() {
  overlay.classList.remove("active");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModalDirect();
});
